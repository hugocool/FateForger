server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 2s
        filters:
          - name: label
            values: ["logging=promtail"]

    relabel_configs:
      # Container name (strip leading /)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container

      # Compose project + service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: compose_project

      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service

      # Use logging_jobname label as the Loki job name
      - source_labels: ["__meta_docker_container_label_logging_jobname"]
        target_label: job

    pipeline_stages:
      # Try to parse each line as JSON (our StructuredJsonFormatter output)
      - json:
          expressions:
            level: level
            event: event
            stage: stage
            agent: agent
            model: model
            tool_name: tool_name
            session_key: session_key
            thread_ts: thread_ts

      # Promote bounded, low-cardinality fields to Loki index labels.
      # High-cardinality fields (session_key, thread_ts, run_id, tool_name)
      # stay in the JSON payload and are queried with LogQL `| json`.
      - labels:
          level:
          event:
          stage:
          agent:
          model:

      # Set the log timestamp from the structured ts field if present
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip

  # ──────────────────────────────────────────────────────────────────
  # LLM IO logs (llm_io_*.jsonl) – written by the app to the host
  # logs/ directory; mounted read-only into this container as /app/logs
  # ──────────────────────────────────────────────────────────────────
  - job_name: llm_io
    static_configs:
      - targets: ["localhost"]
        labels:
          job: fateforger_llm_io
          compose_service: slack-bot
          __path__: /app/logs/llm_io_*.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
            stage: stage
            model: model
            call_label: call_label
            session_key: session_key
            thread_ts: thread_ts
            prompt_tokens: prompt_tokens
            completion_tokens: completion_tokens
            elapsed_s: elapsed_s
            direction: direction

      - labels:
          level:
          event:
          stage:
          model:
          call_label:
          direction:

      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip

  # ──────────────────────────────────────────────────────────────────
  # Timeboxing session event logs (timeboxing_session_*.log)
  # ──────────────────────────────────────────────────────────────────
  - job_name: session_events
    static_configs:
      - targets: ["localhost"]
        labels:
          job: fateforger_session
          compose_service: slack-bot
          __path__: /app/logs/timeboxing_session_*.log

    pipeline_stages:
      # Extract the JSON payload embedded after the Python log level prefix:
      # "2026-03-01 07:08:13,415 INFO {event: ...}"
      - regex:
          expression: '^\d{4}-\d{2}-\d{2} [\d:,]+ \w+ (?P<json_payload>\{.+\})$'

      - json:
          source: json_payload
          expressions:
            level: level
            event: event
            stage: stage
            session_key: session_key
            thread_ts: thread_ts
            elapsed_s: elapsed_s

      - labels:
          level:
          event:
          stage:

      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
