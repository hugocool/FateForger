version: "3.9"

volumes:
  ticktick_data:
    driver: local
  ticktick_config:
    driver: local
  app_data:
    driver: local
  notion_data:
    driver: local
  calendar-mcp-tokens:
    driver: local
  poetry-cache:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
networks:
  admonish-network:
    driver: bridge

x-ticktick-build: &ticktick_build
  context: https://github.com/JakobGruen/ticktick-mcp.git#feature/docker-and-http-support

x-common: &common
  build: *ticktick_build
  env_file: .env
  volumes:
    - ticktick_config:/root/.config/ticktick-mcp
    - .env:/app/.env
  networks:
    - admonish-network

x-google-calendar-mcp:
  &google_calendar_mcp # Pin the google-calendar-mcp version in a single place.
  build:
    context: https://github.com/nspady/google-calendar-mcp.git#v2.3.1
    dockerfile: Dockerfile # repo root
  image: myorg/calendar-mcp:v2.3.1 # optional, for easier identification

services:
  setup-wizard:
    container_name: fateforger-setup-wizard
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "fateforger.setup_wizard.app"]
    env_file: .env
    environment:
      WIZARD_ENV_PATH: "/config/.env"
      WIZARD_SECRETS_DIR: "/config/secrets"
      WIZARD_PORT: "8080"
      WIZARD_ADMIN_TOKEN: "${WIZARD_ADMIN_TOKEN}"
      WIZARD_SESSION_SECRET: "${WIZARD_SESSION_SECRET}"
      WIZARD_CALENDAR_MCP_URL: "${MCP_CALENDAR_SERVER_URL_DOCKER:?Set MCP_CALENDAR_SERVER_URL_DOCKER in .env}"
    volumes:
      - ./:/config
      - calendar-mcp-tokens:/config/calendar-mcp-tokens:ro
      - ticktick_config:/config/ticktick-config:ro
    ports:
      - "${WIZARD_HOST_PORT:-8080}:8080"
    networks:
      - admonish-network
    restart: unless-stopped

  slack-bot:
    container_name: fateforger-slack-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Single source of truth: define MCP_CALENDAR_SERVER_URL_DOCKER in `.env`
      # and pass it through to the app container as MCP_CALENDAR_SERVER_URL.
      MCP_CALENDAR_SERVER_URL: "${MCP_CALENDAR_SERVER_URL_DOCKER:?Set MCP_CALENDAR_SERVER_URL_DOCKER in .env}"
      GRAPHITI_MCP_SERVER_URL: "${GRAPHITI_MCP_SERVER_URL_DOCKER:-http://graphiti-mcp:8000/mcp}"
      GRAPHITI_NEO4J_URI: "${GRAPHITI_NEO4J_URI_DOCKER:-bolt://neo4j:7687}"
    volumes:
      - app_data:/app/data
      - poetry-cache:/root/.cache/pypoetry
      - ./secrets:/app/secrets:ro  # calendar-preferences.json + future secrets (read-only)
    networks:
      - admonish-network
    restart: unless-stopped
    labels:
      # Enable Promtail docker discovery for structured log shipping to Loki.
      logging: "promtail"
      logging_jobname: "fateforger"
    depends_on:
      - calendar-mcp
      - neo4j
      - graphiti-mcp

  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    environment:
      NEO4J_AUTH: "${GRAPHITI_NEO4J_USERNAME:-neo4j}/${GRAPHITI_NEO4J_PASSWORD:-demodemo}"
    ports:
      - "${GRAPHITI_NEO4J_BROWSER_PORT:-7474}:7474"
      - "${GRAPHITI_NEO4J_PUBLIC_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - admonish-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${GRAPHITI_NEO4J_USERNAME:-neo4j} -p ${GRAPHITI_NEO4J_PASSWORD:-demodemo} 'RETURN 1;' >/dev/null 2>&1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 20s

  graphiti-mcp:
    image: zepai/knowledge-graph-mcp:latest
    container_name: graphiti-mcp
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      MODEL_NAME: "${GRAPHITI_MODEL_NAME:-gpt-4.1-mini}"
      GRAPH_DATABASE_PROVIDER: "neo4j"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${GRAPHITI_NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${GRAPHITI_NEO4J_PASSWORD:-demodemo}"
    ports:
      - "${GRAPHITI_MCP_PUBLIC_PORT:-8000}:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - admonish-network
    restart: unless-stopped

  calendar-mcp:
    <<: *google_calendar_mcp
    # ───────────────────────────────────────────────
    # Build directly from the GitHub repo @ tag
    # ───────────────────────────────────────────────

    container_name: google-calendar-mcp
    env_file:
      - .env # Use the main .env file from project root (relative to docker-compose.yml)
    # mount your OAuth JSON (or use secrets)
    volumes:
      - type: bind
        source: ./secrets/gcal-oauth.json
        target: /app/gcp-oauth.keys.json
        read_only: true
      - calendar-mcp-tokens:/home/nodejs/.config/google-calendar-mcp

    ports:
      - "${PORT}:${PORT}"
      - "3500:3500" # OAuth authentication server port
    environment:
      TRANSPORT: "${TRANSPORT}"
      PORT: "${PORT}"
      GOOGLE_OAUTH_CREDENTIALS: "/app/gcp-oauth.keys.json"
      HOST: "0.0.0.0"

    networks:
      - admonish-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');const port=process.env.PORT||3000;const req=http.request({hostname:''127.0.0.1'',port,path:''/healthz'',headers:{Accept:''text/event-stream''}},res=>process.exit(res.statusCode>=200&&res.statusCode<300?0:1));req.on(''error'',()=>process.exit(1));req.end();"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  calendar-mcp-auth:
    <<: *google_calendar_mcp
    # Auth service to get initial tokens - run once then stop
    container_name: google-calendar-mcp-auth
    profiles: ["auth"] # Only runs when specifically requested
    env_file:
      - .env
    volumes:
      - type: bind
        source: ./secrets/gcal-oauth.json
        target: /app/gcp-oauth.keys.json
        read_only: true
      - calendar-mcp-tokens:/home/nodejs/.config/google-calendar-mcp
    ports:
      - "3510:3001" # Different port for auth server
      - "3511:3002"
      - "3512:3003"
      - "3513:3004"
    environment:
      GOOGLE_OAUTH_CREDENTIALS: "/app/gcp-oauth.keys.json"
    command: ["npm", "run", "auth"]
    stdin_open: true
    tty: true
    restart: "no"
    networks:
      - admonish-network
  ticktick-mcp-auth:
    <<: *common
    profiles: ["ticktick", "auth"] # ← only runs when you ask for it
    container_name: ticktick-mcp-auth
    ports:
      - "8000:8000"
    command: ["/bin/sh", "-lc", "uv run -m ticktick_mcp.cli auth"]
    stdin_open: true
    tty: true
    restart: "no"

  ticktick-mcp:
    <<: *common
    profiles: ["ticktick"]
    container_name: ticktick-mcp
    ports:
      - "8002:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - admonish-network

  # Setup Wizard reads WIZARD_* overrides for MCP checks; wire it to the same
  # docker-network MCP endpoint used by the app.
  # notion-mcp:
  #   <<: *common-env
  #   build:
  #     context: https://github.com/makenotion/notion-mcp-server.git#main
  #   command: >
  #     npx -y @notionhq/notion-mcp-server
  #     --transport streamable-https
  #     --port 8002
  #   environment:
  #     MCP_TRANSPORT: streamable-https
  #     NOTION_TOKEN: ${NOTION_TOKEN}
  #   ports:
  #     - "8002:8002"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "https://localhost:8002/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3

  notion-mcp:
    profiles: ["notion"]
    build:
      context: https://github.com/makenotion/notion-mcp-server.git#main
    command:
      [
        "npx",
        "-y",
        "@notionhq/notion-mcp-server",
        "--transport",
        "http",
        "--port",
        "${MCP_HTTP_PORT}",
        "--auth-token",
        "${MCP_HTTP_AUTH_TOKEN}",
      ]
    environment:
      # Notion API credential (internal integration token: ntn_...)
      NOTION_TOKEN: ${NOTION_TOKEN}
    ports:
      - "${MCP_HTTP_PORT}:${MCP_HTTP_PORT}"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "curl", "-sf", "http://localhost:${MCP_HTTP_PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - admonish-network

  toggl-mcp:
    profiles: ["toggl"]
    image: supercorp/supergateway:3.4.3
    container_name: toggl-mcp
    env_file: .env
    command:
      [
        "--stdio",
        "npx -y @verygoodplugins/mcp-toggl@1.0.0",
        "--outputTransport",
        "streamableHttp",
        "--port",
        "8000",
        "--streamableHttpPath",
        "/mcp",
        "--healthEndpoint",
        "/healthz",
        "--logLevel",
        "info",
      ]
    ports:
      - "${TOGGL_MCP_HOST_PORT:-8004}:8000"
    networks:
      - admonish-network
    restart: unless-stopped
